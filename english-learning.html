<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文词汇猜猜学</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0 20px;
        }
        
        header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        header p {
            color: #888;
            font-size: 0.95rem;
        }
        
        /* 输入区域 */
        .input-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .text-input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1.1rem;
            font-family: Georgia, 'Times New Roman', serif;
            resize: vertical;
            min-height: 150px;
            margin-bottom: 15px;
        }
        
        .text-input:focus {
            outline: none;
            border-color: #4facfe;
        }
        
        .text-input::placeholder {
            color: #666;
        }
        
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #1a1a2e;
            font-weight: 600;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(79,172,254,0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #fa709a, #fee140);
            color: #1a1a2e;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 学习区域 */
        .learning-section {
            display: none;
        }
        
        .learning-section.active {
            display: block;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.95rem;
        }
        
        .stat-icon {
            font-size: 1.1rem;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        /* 句子卡片 */
        .sentence-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .sentence-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .sentence-number {
            color: #4facfe;
            font-weight: 600;
        }
        
        .sentence-nav {
            color: #888;
            font-size: 0.9rem;
        }
        
        .chinese-sentence {
            font-size: 1.15rem;
            color: #fee140;
            padding: 15px;
            background: rgba(254,225,64,0.1);
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #fee140;
        }
        
        .source-sentence {
            font-size: 1.5rem;
            line-height: 2.2;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            font-family: Georgia, 'Times New Roman', serif;
        }
        
        .word {
            display: inline-block;
            padding: 8px 14px;
            background: rgba(79,172,254,0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            font-size: 1.1rem;
        }
        
        .word:hover {
            background: rgba(79,172,254,0.5);
            border-color: #4facfe;
            transform: translateY(-2px);
        }
        
        .word.grammar {
            background: rgba(250,173,154,0.2);
            border-color: rgba(250,173,154,0.3);
        }
        
        .word.grammar:hover {
            background: rgba(250,173,154,0.5);
            border-color: #fa709a;
        }
        
        .word.guessed {
            background: rgba(76,175,80,0.3);
            border-color: #4caf50;
            cursor: default;
        }
        
        .word.guessed:hover {
            transform: none;
        }
        
        .word.wrong {
            background: rgba(244,67,54,0.3);
            border-color: #f44336;
        }
        
        .word.skipped {
            background: rgba(255,193,7,0.2);
            border-color: rgba(255,193,7,0.4);
            cursor: default;
        }
        
        .word.skipped:hover {
            transform: none;
        }
        
        /* 猜词面板 */
        .guess-panel {
            display: none;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-top: 20px;
            border: 2px solid #4facfe;
            animation: slideIn 0.3s ease;
        }
        
        .guess-panel.active {
            display: block;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .guess-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .guess-word {
            font-size: 2.5rem;
            font-family: Georgia, 'Times New Roman', serif;
            color: #4facfe;
        }
        
        .guess-actions {
            display: flex;
            gap: 10px;
        }
        
        .audio-btn {
            padding: 10px 16px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .audio-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .close-btn {
            padding: 10px 16px;
            background: rgba(244,67,54,0.2);
            border: none;
            border-radius: 8px;
            color: #f44336;
            cursor: pointer;
            font-size: 1rem;
        }
        
        /* 提示区域 */
        .hint-area {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .hint-label {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }
        
        .hint-text {
            color: #fee140;
            font-size: 1rem;
        }
        
        /* 语法词说明 */
        .grammar-info {
            background: rgba(250,173,154,0.15);
            border-left: 4px solid #fa709a;
            padding: 15px;
            border-radius: 0 10px 10px 0;
            margin-bottom: 15px;
        }
        
        .grammar-info h4 {
            color: #fa709a;
            margin-bottom: 8px;
        }
        
        .grammar-info p {
            color: #ccc;
            font-size: 0.95rem;
        }
        
        .grammar-example {
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 6px;
            margin-top: 10px;
            font-family: Georgia, serif;
            color: #fff;
        }
        
        /* 输入区域 */
        .input-area {
            margin-bottom: 15px;
        }
        
        .guess-input {
            width: 100%;
            padding: 15px;
            font-size: 1.3rem;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        
        .guess-input:focus {
            outline: none;
            border-color: #4facfe;
        }
        
        .guess-hint {
            color: #666;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        
        /* 按钮行 */
        .submit-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        /* 结果区域 */
        .result-panel {
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
        }
        
        .result-panel.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        .result-panel.correct {
            background: rgba(76,175,80,0.2);
            border: 1px solid rgba(76,175,80,0.5);
        }
        
        .result-panel.wrong {
            background: rgba(244,67,54,0.2);
            border: 1px solid rgba(244,67,54,0.5);
        }
        
        .result-panel.skip {
            background: rgba(255,193,7,0.2);
            border: 1px solid rgba(255,193,7,0.5);
        }
        
        .result-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        
        .result-panel.correct .result-title { color: #4caf50; }
        .result-panel.wrong .result-title { color: #f44336; }
        .result-panel.skip .result-title { color: #ffc107; }
        
        .result-answer {
            background: rgba(255,255,255,0.05);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .result-answer strong {
            color: #4facfe;
        }
        
        .result-explanation {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        .result-alternatives {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: #888;
            font-size: 0.9rem;
        }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        /* 完成卡片 */
        .complete-card {
            text-align: center;
            padding: 50px 30px;
        }
        
        .complete-card h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .complete-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .complete-stat {
            text-align: center;
        }
        
        .complete-stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #4facfe;
        }
        
        .complete-stat-label {
            color: #888;
            font-size: 0.9rem;
        }
        
        /* 复习模式提示 */
        .review-banner {
            background: linear-gradient(135deg, #fa709a, #fee140);
            color: #1a1a2e;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
        
        /* 加载状态 */
        .loading {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 词性标签 */
        .pos-tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(79,172,254,0.2);
            color: #4facfe;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 8px;
            font-weight: normal;
        }
        
        .correct-label {
            color: #4facfe;
            font-size: 0.9rem;
        }
        
        /* 单词卡片显示 */
        .word-card {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .word-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .word-card-english {
            font-size: 2rem;
            color: #4facfe;
            font-family: Georgia, serif;
        }
        
        .word-card-phonetic {
            color: #888;
            font-size: 0.9rem;
        }
        
        .word-card-translation {
            font-size: 1.2rem;
            color: #fee140;
            margin-top: 5px;
        }
        
        /* 句子语境卡片 */
        .context-card {
            background: rgba(254,225,64,0.1);
            border-left: 4px solid #fee140;
            padding: 12px 15px;
            border-radius: 0 8px 8px 0;
            margin-top: 15px;
            font-size: 0.95rem;
        }
        
        .context-label {
            color: #fee140;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        
        /* 底部提示 */
        .tip-panel {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #666;
        }
        
        @media (max-width: 600px) {
            .source-sentence {
                font-size: 1.2rem;
            }
            
            .word {
                font-size: 1rem;
                padding: 6px 10px;
            }
            
            .guess-word {
                font-size: 1.8rem;
            }
            
            .status-bar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 英文词汇猜猜学</h1>
            <p>粘贴英文句子，逐词学习，语法词直接告诉你</p>
        </header>
        
        <div class="input-section" id="inputSection">
            <textarea class="text-input" id="sourceText" placeholder="粘贴英文句子...

例如：
I am looking at the beautiful sky. The weather is very nice today.
When I was a child, I lived in Canada with my family."></textarea>
            
            <div class="btn-row">
                <button class="btn btn-primary" id="startBtn" onclick="startLearning()">
                    🚀 开始学习
                </button>
                <button class="btn btn-warning" id="reviewBtn" onclick="startReview()" style="display:none">
                    📝 复习易错词
                </button>
            </div>
        </div>
        
        <div class="learning-section" id="learningSection">
            <div class="review-banner" id="reviewBanner" style="display:none">
                📝 复习模式 - 这些词之前答错过
            </div>
            
            <div class="status-bar">
                <div class="stats">
                    <span class="stat">
                        <span class="stat-icon">✅</span>
                        <span id="correctCount">0</span>/<span id="totalCount">0</span>
                    </span>
                    <span class="stat">
                        <span class="stat-icon">⏭️</span>
                        跳过 <span id="skipCount">0</span>
                    </span>
                    <span class="stat">
                        <span class="stat-icon">📊</span>
                        <span id="accuracy">0</span>%
                    </span>
                </div>
                <button class="btn btn-secondary" onclick="resetLearning()">📝 重新输入</button>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div id="sentenceContainer"></div>
            
            <div class="controls" id="controls"></div>
        </div>
    </div>
    
    <script>
        // ==================== 核心数据 ====================
        
        // 英文语法词（直接显示答案，不让猜）
        const grammarWords = {
            // 冠词
            'the': { answer: '（特指）这/那', explanation: '定冠词，用于特指前文提到过或双方都知道的事物。中文没有对应词，靠语境理解。', example: 'The book is mine. → 那本书是我的。' },
            'a': { answer: '（泛指）一/一个', explanation: '不定冠词，用于泛指单数可数名词。中文用"一个"或直接省略。', example: 'I am a student. → 我是一个学生。' },
            'an': { answer: '（泛指）一/一个', explanation: '不定冠词，用于元音字母开头的词前，发音与 a 相同。', example: 'an apple → 一个苹果' },
            
            // be动词
            'is': { answer: '是', explanation: 'be动词第三人称单数现在式。' },
            'are': { answer: '是', explanation: 'be动词复数现在式（你/我/他们等）。' },
            'was': { answer: '是（过去）', explanation: 'be动词过去式（单数）' },
            'were': { answer: '是（过去）', explanation: 'be动词过去式（复数）' },
            'be': { answer: '是/成为', explanation: 'be动词原形，用于不定式或虚拟语气。' },
            'been': { answer: '曾经是', explanation: 'be动词的完成式形式。' },
            'being': { answer: '正在是', explanation: 'be动词进行式形式。' },
            
            // 助动词
            'have': { answer: '有/已经', explanation: '助动词，用于现在完成时；行为动词表示"拥有"。' },
            'has': { answer: '有/已经', explanation: 'have 的第三人称单数形式。' },
            'had': { answer: '有/已经（过去）', explanation: '过去式/过去完成式。' },
            'do': { answer: '做/用于疑问', explanation: '行为动词"做"；助动词用于构成疑问句和否定句。' },
            'does': { answer: '做/用于疑问', explanation: 'do 的第三人称单数。' },
            'did': { answer: '做/用于疑问（过去）', explanation: 'do 的过去式。' },
            'will': { answer: '将/会', explanation: '将来时助动词。' },
            'would': { answer: '将/会/愿意', explanation: '过去将来时，或表示委婉/意愿。' },
            'could': { answer: '能/可以', explanation: 'can 的过去式，表示能力或许可。' },
            'should': { answer: '应该', explanation: '表示建议、义务。' },
            'may': { answer: '可能/可以', explanation: '表示可能性或允许。' },
            'might': { answer: '也许', explanation: 'may 的过去式，表示较小可能性。' },
            'must': { answer: '必须', explanation: '表示义务、必要性。' },
            'can': { answer: '能/会', explanation: '表示能力或许可。' },
            
            // to
            'to': { answer: '到/为了', explanation: '不定式符号；介词表示方向"向..."。' },
            
            // 介词/副词
            'of': { answer: '的', explanation: '所有关系，相当于"...的"。注意：中文的"的"有时省略。', example: 'a book of mine → 我的一本书（的书）' },
            'in': { answer: '在...里/在...期间', explanation: '地点（内部）；时间（期间）。中文说"在"但位置不同。' },
            'out': { answer: '向外/在外面', explanation: '表示方向向外，或状态在外面。常和 of 搭配使用。', example: 'look out of the window → 向窗外看' },
            'for': { answer: '为了/对于/持续', explanation: '目的（为了）；对象（对于）；时间长度（持续）。' },
            'on': { answer: '在...上面/关于', explanation: '表面接触（上面）；某天（on Monday）；话题（关于）。' },
            'with': { answer: '和...一起/用...', explanation: '伴随（和一起）；工具（用...）。' },
            'at': { answer: '在（某点）', explanation: '地点（某处）；时间（某刻）。通常指较小地点或精确时间点。' },
            'by': { answer: '通过/被/在...旁边', explanation: '方式（通过）；被动（被）；位置（在...旁）。' },
            'from': { answer: '从...', explanation: '起点（从哪里）；来源（来自）。' },
            'as': { answer: '作为/像...一样', explanation: '身份（作为）；方式（像...一样）；原因。' },
            'into': { answer: '进入...里', explanation: '表示方向，进入某物内部。' },
            'out of': { answer: '向...外/从...出来', explanation: '表示从内部向外的动作。', example: 'look out of the window → 向窗外看' },
            'through': { answer: '穿过/通过', explanation: '空间上穿过某物。' },
            'over': { answer: '在...上方/超过', explanation: '空间（上方）；数量（超过）。' },
            'under': { answer: '在...下方', explanation: '空间位置。' },
            'between': { answer: '在...之间', explanation: '两者之间。' },
            'among': { answer: '在...之中', explanation: '三者或以上之中。' },

        // ==================== 翻译 API ====================
        async function translateWord(word) {
            try {
                // 使用 Free Dictionary API（最权威的免费英语词典）
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data && data[0]) {
                        // 优先取中文释义，没有中文就用英文
                        for (const meaning of data[0].meanings || []) {
                            for (const def of meaning.definitions || []) {
                                if (def.translations && def.translations.length > 0) {
                                    return def.translations[0].text;
                                }
                            }
                            // 如果没有中文翻译，用英文释义
                            if (meaning.partOfSpeech && !meaning.partOfSpeech.includes('.')) {
                                // 跳过无效的词性
                            }
                        }
                        // 最后回退：取第一个定义的英文释义
                        const firstDef = data[0].meanings?.[0]?.definitions?.[0]?.definition;
                        if (firstDef) {
                            return `[${data[0].meanings[0].partOfSpeech}] ${firstDef}`;
                        }
                    }
                }
            } catch (e) {
                console.error('Dictionary API error:', e);
            }
            return null;
        }
        
        async function translateSentence(sentence) {
            try {
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(sentence)}&langpair=en|zh`;
                const response = await fetch(url);
                const data = await response.json();
                if (data.responseStatus === 200) {
                    return data.responseData.translatedText;
                }
            } catch (e) {}
            return sentence;
        }
        
        // ==================== 核心逻辑 ====================

            }

            btn.disabled = true;

            correctCount = 0;
            skipCount = 0;
            totalAttempts = 0;
            wrongWords = [];
            isReviewMode = false;
            lessonData = [];
            currentSentenceIndex = 0;
            
            // 解析句子
            const sentences = sourceText.split(/[.。!?]+/).filter(s => s.trim());
            
            try {
                for (const s of sentences) {
                    const source = s.trim();
                    if (!source) continue;
                    
                    const chinese = await translateSentence(source);
                    const words = parseWords(source, chinese);
                    
                    lessonData.push({
                        text: source,
                        chinese: chinese,
                        words: words
                    });
                }
                
                if (lessonData.length === 0) {
                    alert('未能解析内容');
                    return;
                }
                
                // 检查是否有复习词
                loadWrongWords();
                document.getElementById('reviewBtn').style.display = wrongWords.length > 0 ? 'inline-block' : 'none';
                
                document.getElementById('inputSection').style.display = 'none';
                document.getElementById('learningSection').classList.add('active');
                document.getElementById('reviewBanner').style.display = 'none';
                
                renderSentence();
                
            } catch (e) {
                console.error(e);
                alert('翻译失败，请重试');

            btn.disabled = false;
            btn.innerHTML = '🚀 开始学习';
        }
        
        function parseWords(source, chinese) {
            const words = source.split(/\s+/).filter(w => w);
            
            return words.map(word => {
                const cleanWord = word.replace(/^[,.!?;:'""]+|[,.!?;:'""]+$/g, '').toLowerCase();
                
                // 检查语法词
                if (grammarWords[cleanWord]) {
                    return {
                        word: word,
                        cleanWord: cleanWord,
                        type: 'grammar',
                        ...grammarWords[cleanWord]
                    };
                }
                
                // 检查词典（新格式：{answer, pos}）
                if (dictionary[cleanWord]) {
                    const entry = dictionary[cleanWord];
                    const answerText = typeof entry === 'object' ? entry.answer : entry;
                    const posText = typeof entry === 'object' ? entry.pos : '';
                    return {
                        word: word,
                        cleanWord: cleanWord,
                        type: 'content',
                        answer: answerText,
                        pos: posText,
                        alternatives: getAlternatives(cleanWord)
                    };
                }
                
                // 未知词，查询API
                return {
                    word: word,
                    cleanWord: cleanWord,
                    type: 'unknown',
                    answer: '', // 待查询
                    alternatives: []
                };
            });
        }
        
        function getAlternatives(word) {
            // 返回同一意思的其他翻译
            const alts = [];
            const entry = dictionary[word];
            if (!entry) return alts;
            
            const mainAnswer = typeof entry === 'object' ? entry.answer : entry;
            if (!mainAnswer) return alts;
            
            for (const [key, val] of Object.entries(dictionary)) {
                if (key === word) continue;
                const valAnswer = typeof val === 'object' ? val.answer : val;
                if (valAnswer === mainAnswer) {
                    alts.push(valAnswer);
                }
            }
            return [...new Set(alts)];
        }
        
        async function queryUnknownWord(wordObj) {
            if (wordObj.answer) return wordObj;
            
            const translation = await translateWord(wordObj.cleanWord);
            if (translation && translation !== wordObj.cleanWord) {
                wordObj.answer = translation;
                // 加入词典缓存
                dictionary[wordObj.cleanWord] = { answer: translation, pos: '' };
            }
            return wordObj;
        }
        
        // ==================== 判断逻辑 ====================
        function checkAnswer(input, correct) {
            if (!input || !input.trim()) return false;
            if (!correct) return false;
            
            const inp = input.trim().toLowerCase().replace(/[（）]/g, '').trim();
            const corr = correct.toLowerCase().replace(/[（）]/g, '').trim();
            
            // 1. 完全一致
            if (inp === corr) return true;
            
            // 2. 子串匹配（核心字）- 只要用户输入是答案的子串，或答案是用户输入的子串
            if (corr.includes(inp) || inp.includes(corr)) return true;
            
            // 3. 去除"的"比较
            if (corr.replace(/的/g, '') === inp) return true;
            
            // 4. 多义词分隔（用 / 分隔的多个意思）
            const corrParts = corr.split('/').map(s => s.trim());
            for (const part of corrParts) {
                if (part === inp) return true;
                // 子串匹配也适用于分隔后的每个部分
                if (part.includes(inp) || inp.includes(part)) return true;
            }
            
            // 5. 同义词映射 - 双向检查
            const inpCanon = synonyms[inp] || inp;
            const corrCanon = synonyms[corr] || corr;
            if (inpCanon === corrCanon) return true;
            
            // 6. 输入映射后的值是否包含在答案中，或答案包含输入映射后的值
            if (corr.includes(inpCanon) || inpCanon.includes(corrCanon)) return true;
            
            // 7. 检查分隔后的每个答案部分是否和输入的同义词映射相同
            for (const part of corrParts) {
                const partCanon = synonyms[part] || part;
                if (partCanon === inpCanon) return true;
            }
            
            // 8. 检查输入是否在同义词表里，且和答案映射到同一组
            for (const [alias, canon] of Object.entries(synonyms)) {
                if ((inp === alias || inpCanon === alias) && (corr === alias || corrCanon === alias)) {
                    return true;
                }
                // 也检查分隔后的答案部分
                for (const part of corrParts) {
                    const partCanon = synonyms[part] || part;
                    if ((inp === alias || inpCanon === alias) && (part === alias || partCanon === alias)) {
                        return true;
                    }
                }
            }
            
            return false;
        }

        function getPosHint(pos) {
            if (pos.includes('v.')) return '动词：想想"做什么"或"是什么状态"';

            if (pos.includes('adj.')) return '形容词：想想"什么样的"';
            if (pos.includes('adv.')) return '副词：想想"怎么做"';
            if (pos.includes('pron.')) return '代词：想想"代替什么"';
            if (pos.includes('prep.')) return '介词：想想"和...什么关系"';
            if (pos.includes('conj.')) return '连词：想想"连接什么"';
            if (pos.includes('det.')) return '限定词：想想"多少/哪些"';

            skipCount++;
            
            const posLabel = word.pos ? `<span class="pos-tag">${word.pos}</span>` : '';
            const posHint = getPosHint(word.pos || '');
            
            document.getElementById('resultPanel').innerHTML = `
                <div class="result-panel skip show">
                    <div class="result-title">⏭️ 已跳过</div>
                    <div class="result-answer">
                        <span class="correct-label">正确答案：</span>
                        <strong>${word.answer || '（待查询）'}</strong>
                        ${posLabel}
                    </div>
                    <div class="result-explanation">
                        💡 ${posHint || '记住这个意思，下次遇到就会了！'}
                        <br>跳过不丢人，回头复习就好~
                    </div>
                </div>
            `;
            
            updateWordDisplay(currentSentenceIndex, currentWordIndex);
            updateStats();
        }
        
        function showResult(word, input, isCorrect) {
            const resultPanel = document.getElementById('resultPanel');
            const posLabel = word.pos ? `<span class="pos-tag">${word.pos}</span>` : '';
            
            let html = `
                <div class="result-panel ${isCorrect ? 'correct' : 'wrong'} show">
                    <div class="result-title">${isCorrect ? '🎉 正确！' : '🤔 不太对哦'}</div>
            `;
            
            if (isCorrect) {
                html += `<div class="result-explanation">👍 你猜对了！`;
                if (word.pos) {
                    html += ` <span class="pos-tag">${word.pos}</span>`;
                }
                if (word.alternatives && word.alternatives.length > 0) {
                    html += `<br>📝 同义表达：${word.alternatives.join('、')}`;
                }
                html += `</div>`;
            } else {
                // 改进的错误提示 - 更醒目的答案显示
                const userAnswer = input.trim();
                const correctAnswer = word.answer || '（未知）';
                
                html += `
                    <div style="background:rgba(79,172,254,0.15);border:2px solid #4facfe;border-radius:10px;padding:15px;margin-bottom:15px;text-align:center;">
                        <div style="color:#888;font-size:0.9rem;margin-bottom:8px;">✏️ 你的答案</div>
                        <div style="font-size:1.1rem;color:#fff;">"${userAnswer}"</div>
                        <div style="color:#666;margin-top:5px;">↓</div>
                        <div style="color:#888;font-size:0.9rem;margin-top:8px;">✓ 正确答案</div>
                        <div style="font-size:1.5rem;color:#4facfe;font-weight:bold;margin-top:5px;">${correctAnswer}</div>
                        ${posLabel ? `<span class="pos-tag" style="margin-top:10px;">${posLabel}</span>` : ''}
                    </div>
                `;
                
                // 根据不同情况给出不同的提示（答案已在上方醒目显示）
                const posHints = {
                    'v.': '动词，想想"做什么"？',
                    'n.': '名词，想想"什么东西"？',
                    'adj.': '形容词，想想"什么样的"？',
                    'adv.': '副词，想想"怎么做"？',
                    'prep.': '介词，想想"和...什么关系"？',
                    'conj.': '连词，想想"连接什么"？',
                    'pron.': '代词，想想"代替什么"？',
                };
                
                let hintText = '';
                for (const [pos, hint] of Object.entries(posHints)) {
                    if (word.pos && word.pos.includes(pos)) {
                        hintText = hint;
                        break;
                    }
                }
                
                if (hintText) {
                    html += `<div style="color:#888;font-size:0.95rem;text-align:center;margin-top:10px;">💡 提示：${hintText}</div>`;
                }
            }
            
            html += `</div>`;
            resultPanel.innerHTML = html;
            
            // 自动关闭（正确时）
            if (isCorrect) {
                setTimeout(closePanel, 2000);
            }
        }
        
        function closePanel() {
            document.getElementById('guessPanel').classList.remove('active');
            currentWordIndex = -1;
        }
        
        function updateWordDisplay(sentenceIdx, wordIdx) {
            const wordEl = document.querySelector(`.word[data-index="${wordIdx}"]`);
            if (wordEl) {
                const word = lessonData[sentenceIdx].words[wordIdx];
                const status = getWordStatus(word, wordIdx);
                wordEl.className = `word ${word.type === 'grammar' ? 'grammar' : ''} ${status}`;
                if (word.answer) {
                    wordEl.title = word.answer;
                }
            }
        }
        
        function updateStats() {
            const total = lessonData.reduce((sum, s) => sum + s.words.filter(w => w.type !== 'grammar').length, 0);
            const completed = lessonData.reduce((sum, s) => sum + s.words.filter(w => w.guessed === true || w.skipped || w.type === 'grammar').length, 0);
            
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('skipCount').textContent = skipCount;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('accuracy').textContent = 
                totalAttempts > 0 ? Math.round((correctCount / totalAttempts) * 100) : 0;
            
            const percent = total > 0 ? (completed / total) * 100 : 0;
            document.getElementById('progressFill').style.width = percent + '%';
        }
        
        function updateControls() {
            const controls = document.getElementById('controls');
            controls.innerHTML = `
                <button class="btn btn-secondary" onclick="prevSentence()" ${currentSentenceIndex === 0 ? 'disabled' : ''}>
                    ⬅️ 上一句
                </button>
                <button class="btn btn-secondary" onclick="nextSentence()" ${currentSentenceIndex >= lessonData.length - 1 ? 'disabled' : ''}>
                    下一句 ➡️
                </button>
            `;
        }
        
        function prevSentence() {
            if (currentSentenceIndex > 0) {
                currentSentenceIndex--;
                closePanel();
                renderSentence();
            }
        }
        
        function nextSentence() {
            if (currentSentenceIndex < lessonData.length - 1) {
                currentSentenceIndex++;
                closePanel();
                renderSentence();
            }
        }
        
        function renderComplete() {
            const container = document.getElementById('sentenceContainer');
            container.innerHTML = `
                <div class="sentence-card">
                    <div class="complete-card">
                        <h2>🎉 学习完成！</h2>
                        <div class="complete-stats">
                            <div class="complete-stat">
                                <div class="complete-stat-value">${correctCount}</div>
                                <div class="complete-stat-label">答对</div>
                            </div>
                            <div class="complete-stat">
                                <div class="complete-stat-value">${skipCount}</div>
                                <div class="complete-stat-label">跳过</div>
                            </div>
                            <div class="complete-stat">
                                <div class="complete-stat-value">${wrongWords.length}</div>
                                <div class="complete-stat-label">易错词</div>
                            </div>
                            <div class="complete-stat">
                                <div class="complete-stat-value">${totalAttempts > 0 ? Math.round((correctCount / totalAttempts) * 100) : 0}%</div>
                                <div class="complete-stat-label">正确率</div>
                            </div>
                        </div>
                        ${wrongWords.length > 0 ? '<p style="color:#888;margin-bottom:20px">有易错词需要复习哦~</p>' : ''}
                        <button class="btn btn-primary" onclick="resetLearning()">继续学习更多</button>
                    </div>
                </div>
            `;
            document.getElementById('controls').innerHTML = '';
        }
        
        // ==================== 复习模式 ====================
        function startReview() {
            if (wrongWords.length === 0) return;
            
            isReviewMode = true;
            currentSentenceIndex = 0;
            correctCount = 0;
            skipCount = 0;
            totalAttempts = 0;
            
            // 构建复习数据
            lessonData = wrongWords.map(item => {
                const [word, answer] = item.split('|');
                return {
                    text: word,
                    chinese: '复习模式',
                    words: [{
                        word: word,
                        cleanWord: word.toLowerCase(),
                        type: 'content',
                        answer: answer,
                        alternatives: []
                    }]
                };
            });
            
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('learningSection').classList.add('active');
            document.getElementById('reviewBanner').style.display = 'block';
            
            renderSentence();
        }
        
        // ==================== 持久化 ====================
        function saveWrongWords() {
            localStorage.setItem('en-learning-wrong-words', JSON.stringify(wrongWords));
        }
        
        function loadWrongWords() {
            try {
                const saved = localStorage.getItem('en-learning-wrong-words');
                if (saved) {
                    wrongWords = JSON.parse(saved);
                }
            } catch (e) {}
        }
        
        function resetLearning() {
            closePanel();
            document.getElementById('learningSection').classList.remove('active');
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('sourceText').value = '';
            loadWrongWords();
            document.getElementById('reviewBtn').style.display = wrongWords.length > 0 ? 'inline-block' : 'none';
        }
        
        // ==================== 发音 ====================
        function playAudio(word) {
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
